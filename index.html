<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Activity</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🎲 Random Activity</h1>

    <div class="container">

        <div id="activity">
            Нажми кнопку
        </div>

        <button id="generate">
            🎲 Сгенерировать
        </button>

        <button id="copy">
            📋 Скопировать
        </button>

        <div class="categories">

            <button class="category active" data-category="all">🌍 Все</button>

            <button class="category" data-category="home">🏠 Дома</button>

            <button class="category" data-category="alone">👤 Один</button>

            <button class="category" data-category="friends">👥 С друзьями</button>

            <button class="category" data-category="outside">🌳 На улице</button>

            <button class="category" data-category="sport">💪 Спорт</button>

            <button class="category" data-category="games">🎮 Игры</button>

            <button class="category" data-category="movies">🎬 Фильмы</button>

            <button class="category" data-category="music">🎵 Музыка</button>

            <button class="category" data-category="food">🍕 Еда</button>

            <button class="category" data-category="study">📚 Учёба</button>

            <button class="category" data-category="creative">🎨 Творчество</button>

            <button class="category" data-category="travel">✈️ Путешествия</button>

            <button class="category" data-category="relax">🛋 Отдых</button>

            <button class="category" data-category="challenge">🔥 Челлендж</button>

        </div>

    </div>

    <script src="skript.js"></script>

</body>
</html>
